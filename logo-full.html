<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#2B1C14}
  .box{width:100vw;height:100vh;background:#2B1C14;display:flex;align-items:center;justify-content:center;position:relative}
  .glow{position:absolute;width:70vh;height:70vh;border-radius:50%;background:radial-gradient(circle,rgba(168,59,73,.30),transparent 70%);top:5vh;right:12vw;filter:blur(20px)}
  .w{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30vh;letter-spacing:-1.8vh;color:#EFE4D0;position:relative;z-index:2;line-height:1}
  .w .d{color:#C0485A}
</style></head>
<body><div class="box"><div class="glow"></div><div class="w">anta<span class="d">.</span></div></div></body></html>
